<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTIVATION</title>
</head>
<body>


    <div class="conteiner">

    <img src="vergilmotivation.png" class="titulo">
    <br>
    
    <img src="sub.png" class="subtitulo">
    <form id="id_loterica">
        <fieldset>
            <legend>Se Motive:</legend>
            <label for="nome">
                Motivador:
                <input 
                type="text"
                name="nome"
                id="id_nome"
                placeholder="Informe o nome do que busca a motivação"
                required
                >
            </label>
            <br>
            <input 
            type="radio" 
            name="radio_p" 
            id="id_normal"
            value="sem prioridade"
            >dante...
            <input 
            type="radio" 
            name="radio_p" 
            id="id_prioridade"
            value="prioridade"
            >I AM THE STORM
            <br>
            <button type="submit">I need more... POWER</button>

        </fieldset>

        <fieldset>
                <legend>Fila da motivação:</legend>
            
                <div id="resultado_fila"></div>

        </fieldset>
        
        <input 
        type="button" 
        value="JUDGEMENT CUT"
        id="btn_atender"
        >

    </form>
</div>

    <link rel="stylesheet" href="storm.css">
    <script src="power.js"></script>
</body>
</html>
