    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de cadastro</title>
</head>
<body>    
    <form id="id_formulario">
        <fieldset>
            <legend>CADASTRO</legend>

            <label for="nome">Nome:
                <input
                type="text"
                id="id_nome"
                placeholder="Informe seu nome"
                required
                >
            
            </label>
<br>
            <label for="email">E-mail:
                <input
                type="text"
                id="id_email"
                placeholder="Informe seu E-mail"
                required
                >

                <br>

                <label for="idade">Idade:
                    <input
                    type="number"
                    id="id_idade"
                    placeholder="Informe sua idade"
                    required
                    >
                </label>
            </label>
            <fieldset>
                <legend>Radio - S:</legend>

                <label for="m">
                    <input
                    type="radio"
                    name="radio-s"
                    id="m"
                    value="Masculino"
                    >M
                </label>
                <label for="f">
                    <input
                    type="radio"
                    name="radio-s"
                    id="f"
                    value="Feminino"
                    >F
                </label>
            </fieldset>

            <fieldset>
                <legend>Checkbox - Tecnologias:</legend>
                
                <label for="java">
                    <input
                    type="checkbox"
                    name="checkbox_tech"
                    value="Java"
                    id="id_java"
                    >Java
                </label>

                <label for="js">
                    <input
                    type="checkbox"
                    name="checkbox_tech"
                    value="JS"
                    id="id_js"
                    >JS
                </label>

                <label for="python">
                    <input type="checkbox"
                    name="checkbox_tech"
                    value="Python"
                    id="id_python"
                    >Python
                </label>
            </fieldset>

            <fieldset>
                <legend>Hobbies:</legend>
                <select name="hobbie" id="id_hobbie">
                    <option selected disabled>Escolha um hobbie:</option>
                    <optgroup label="Esportes">
                        <option value="Futebol">Futebol</option>
                        <option value="Basquete">Basquete</option>
                        <option value="Corrida">Corrida</option>
                        <option value="Outro(esporte)">Outro</option>
                    </optgroup>
                    <optgroup label="Lazer">
                        <option value="Literatura">Literatura</option>
                        <option value="Videogames">Videogames</option>
                        <option value="Outro(lazer)">Outro</option>
                    </optgroup>
                </select>
            </fieldset>
            <br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar dados</button>
        </fieldset>
        
        
    </form>

    
    <script src="f.js"></script>
    <link rel="stylesheet" href="style.css">
</body>
</html>
